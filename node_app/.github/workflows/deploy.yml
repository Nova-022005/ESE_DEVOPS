name: cicd-pipeline
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu:latest
    steps:
      - name: Checkout   # fetches your repository’s code into the runner so subsequent steps can work with it.
        uses: actions/checkout@v3

      - name: Setup  # for installing node.js for running typescript/javascript
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
      
      - name: Run test
        run: npm test
  
  deploy:
    runs-on: ubuntu:latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: deploy
        run : echo "Succesfully deployed"



      


  